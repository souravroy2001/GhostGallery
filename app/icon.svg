<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#0083ff" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00e5ff" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Sleek dark background matching Ghost Gallery's theme -->
  <rect width="32" height="32" rx="6" fill="#0d1117" />
  <!-- Glowing Hexagon -->
  <polygon points="16,6 25,11 25,21 16,26 7,21 7,11" fill="none" stroke="url(#cyanGlow)" stroke-width="2.5" stroke-linejoin="round" filter="url(#shadow)" />
  <!-- Small center dot -->
  <circle cx="16" cy="16" r="2.5" fill="url(#cyanGlow)" />
</svg>
